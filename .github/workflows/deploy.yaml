# ============================================================
# GitHub Actions — Full CI/CD Pipeline
# Builds Docker image → Pushes to ECR → Deploys via Terraform
# AWS Academy Compatible (uses session token)
# ============================================================

name: Deploy to AWS ECS

on:
  push:
    branches:
      - main  # Triggers on every push to automat branch

env:
  AWS_REGION:    us-east-1
  APP_NAME:      devops-static123456789-app   # ← single source of truth for the app name
  TF_VERSION:    1.9.8
  TF_IN_AUTOMATION: "true"
  # Pass all required Terraform variables from the workflow
  TF_VAR_aws_region:            us-east-1
  TF_VAR_app_name:              devops-static12345678-app   # mirrors APP_NAME above
  # NOTE: vpc_id, subnet_id, security_group_id are auto-fetched by Terraform data sources


jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS credentials (Academy = 3 keys) ──
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Step 3: Validate required secrets exist ────────────
      - name: Validate Required Secrets
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"     || (echo "❌ Missing: AWS_ACCESS_KEY_ID"     && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "❌ Missing: AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "${{ secrets.AWS_SESSION_TOKEN }}"     || (echo "❌ Missing: AWS_SESSION_TOKEN"     && exit 1)
          echo "✅ All required secrets present"

      # ── Step 4: Login to Amazon ECR & capture registry URL ─
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 5: Ensure ECR repository exists (CLI — idempotent) ──
      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories \
            --repository-names "${{ env.APP_NAME }}" \
            --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 \
          || aws ecr create-repository \
            --repository-name "${{ env.APP_NAME }}" \
            --region "${{ env.AWS_REGION }}"
          echo "✅ ECR repository ready: ${{ env.APP_NAME }}"

      # ── Step 6: Build, Tag & Push Docker Image ─────────────
      - name: Build, Tag & Push Docker Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/${{ env.APP_NAME }}:$IMAGE_TAG
          LATEST_URI=$ECR_REGISTRY/${{ env.APP_NAME }}:latest

          echo "Building Docker image..."
          docker build -t "$IMAGE_URI" -t "$LATEST_URI" .

          echo "Pushing image to ECR..."
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          # Export for downstream steps
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "✅ Docker image pushed: $IMAGE_URI"

      # ── Step 7: Setup Terraform ────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Step 8: Terraform Version Check ───────────────────
      - name: Terraform Version Check
        run: terraform version

      # ── Step 9: Terraform Format Check ────────────────────
      - name: Terraform Fmt Check
        working-directory: ./terraform
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform formatting is valid"

      # ── Step 10: Terraform Init ────────────────────────────
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init -upgrade -input=false \
          || (rm -rf .terraform .terraform.lock.hcl && terraform init -upgrade -input=false)
          echo "✅ Terraform initialized"

      # ── Step 11: Import existing resources (idempotent) ────
      # Importing prevents "already exists" errors on repeat runs.
      # Uses || true so a first-run (nothing to import) never fails.
      - name: Terraform Import Existing Resources
        working-directory: ./terraform
        env:
          TF_VAR_image_uri:        ${{ steps.build-image.outputs.image }}
          TF_VAR_ecr_registry_url: ${{ steps.build-image.outputs.registry }}
        run: |
          # Fetch AWS account ID needed for S3 bucket name
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="${{ env.APP_NAME }}-${ACCOUNT_ID}"
          echo "S3 bucket name: $S3_BUCKET"

          echo "→ Importing S3 bucket..."
          terraform import -input=false \
            aws_s3_bucket.app_bucket \
            "$S3_BUCKET" || true

          echo "→ Importing S3 versioning..."
          terraform import -input=false \
            aws_s3_bucket_versioning.app_bucket_versioning \
            "$S3_BUCKET" || true

          echo "→ Importing S3 encryption config..."
          terraform import -input=false \
            aws_s3_bucket_server_side_encryption_configuration.app_bucket_encryption \
            "$S3_BUCKET" || true

          echo "→ Importing S3 public access block..."
          terraform import -input=false \
            aws_s3_bucket_public_access_block.app_bucket_public_access \
            "$S3_BUCKET" || true

          echo "→ Importing ECS cluster..."
          terraform import -input=false \
            aws_ecs_cluster.app_cluster \
            "${{ env.APP_NAME }}-cluster" || true

          echo "→ Importing CloudWatch log group..."
          terraform import -input=false \
            aws_cloudwatch_log_group.app_logs \
            "/ecs/${{ env.APP_NAME }}" || true

          echo "→ Importing ECS service..."
          terraform import -input=false \
            aws_ecs_service.app_service \
            "${{ env.APP_NAME }}-cluster/${{ env.APP_NAME }}-service" || true

          # ── ALB imports (look up ARNs dynamically) ──────────
          echo "→ Importing ALB security group..."
          ALB_SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=group-name,Values=${{ env.APP_NAME }}-alb-sg" \
            --region "${{ env.AWS_REGION }}" \
            --query "SecurityGroups[0].GroupId" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ALB_SG_ID" ] && [ "$ALB_SG_ID" != "None" ]; then
            terraform import -input=false aws_security_group.alb_sg "$ALB_SG_ID" || true
          fi

          echo "→ Importing ALB..."
          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "${{ env.APP_NAME }}-alb" \
            --region "${{ env.AWS_REGION }}" \
            --query "LoadBalancers[0].LoadBalancerArn" \
            --output text 2>/dev/null || echo "")
          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            terraform import -input=false aws_lb.app_alb "$ALB_ARN" || true

            echo "→ Importing ALB listener..."
            LISTENER_ARN=$(aws elbv2 describe-listeners \
              --load-balancer-arn "$ALB_ARN" \
              --region "${{ env.AWS_REGION }}" \
              --query "Listeners[0].ListenerArn" \
              --output text 2>/dev/null || echo "")
            if [ -n "$LISTENER_ARN" ] && [ "$LISTENER_ARN" != "None" ]; then
              terraform import -input=false aws_lb_listener.app_listener "$LISTENER_ARN" || true
            fi
          fi

          echo "→ Importing ALB target group..."
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${{ env.APP_NAME }}-tg" \
            --region "${{ env.AWS_REGION }}" \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text 2>/dev/null || echo "")
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            terraform import -input=false aws_lb_target_group.app_tg "$TG_ARN" || true
          fi

          echo "✅ Import step complete"



      # ── Step 12: Terraform Validate ───────────────────────
      - name: Terraform Validate
        working-directory: ./terraform
        run: |
          terraform validate
          echo "✅ Terraform configuration is valid"

      # ── Step 13: Terraform Plan ────────────────────────────
      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_image_uri:        ${{ steps.build-image.outputs.image }}
          TF_VAR_ecr_registry_url: ${{ steps.build-image.outputs.registry }}
        run: |
          terraform plan -input=false -out=tfplan
          echo "✅ Terraform plan complete"

      # ── Step 14: Terraform Apply ───────────────────────────
      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_image_uri:        ${{ steps.build-image.outputs.image }}
          TF_VAR_ecr_registry_url: ${{ steps.build-image.outputs.registry }}
        run: |
          terraform apply -input=false -auto-approve tfplan
          echo "✅ Infrastructure provisioned successfully"

      # ── Step 15: Verify ECS Service is Running ─────────────
      - name: Verify ECS Service is Stable
        run: |
          echo "Waiting for ECS service to reach steady state..."
          aws ecs wait services-stable \
            --cluster "${{ env.APP_NAME }}-cluster" \
            --services "${{ env.APP_NAME }}-service" \
            --region "${{ env.AWS_REGION }}"
          echo "✅ ECS service is running and stable"

          # Show running task count
          RUNNING=$(aws ecs describe-services \
            --cluster "${{ env.APP_NAME }}-cluster" \
            --services "${{ env.APP_NAME }}-service" \
            --region "${{ env.AWS_REGION }}" \
            --query "services[0].runningCount" \
            --output text)
          echo "Running tasks: $RUNNING"

      # ── Step 16: Get ALB DNS & Print URL ──────────────────
      - name: Get ALB URL
        id: get-url
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ env.APP_NAME }}-alb" \
            --region "${{ env.AWS_REGION }}" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "✅ ALB DNS: $ALB_DNS"

      # ── Step 17: Deployment Summary ───────────────────────
      - name: Deployment Summary
        run: |
          echo "============================================"
          echo "  ✅ DEPLOYMENT COMPLETE"
          echo "============================================"
          echo "  App Name  : ${{ env.APP_NAME }}"
          echo "  Region    : ${{ env.AWS_REGION }}"
          echo "  Image     : ${{ steps.build-image.outputs.image }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "============================================"
          echo ""
          echo "🌐 Visit your app at:"
          echo "   http://${{ steps.get-url.outputs.alb_dns }}"
          echo ""
          echo "👉 Or: AWS Console → ECS → Clusters"
          echo "   → ${{ env.APP_NAME }}-cluster → Tasks → Public IP"
